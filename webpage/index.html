<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory API</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 2rem; 
            max-width: 600px; 
        }
        textarea { 
            width: 100%; 
            height: 200px; 
            margin-bottom: 1rem; 
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        input { 
            flex-grow: 1; 
            padding: 8px; 
        }
        button { 
            padding: 8px 16px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <h2>Available Files</h2>
    <textarea id="manifestBox" readonly>Loading manifest data...</textarea>
    
    <div class="controls">
        <input type="text" id="filename" placeholder="Enter file name">
        <button onclick="handleAction('view')">View</button>
        <button onclick="handleAction('down')">Download</button>
    </div>

    <script>
        fetch('/view/manifest.json/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('manifestBox').value = data;
            })
            .catch(error => {
                document.getElementById('manifestBox').value = 'Could not load manifest. Make sure the API is running.';
            });

        function handleAction(action) {
            const file = document.getElementById('filename').value;
            if (file) {
                window.open(`/${action}/${file}/`, '_blank');
            } else {
                alert('Please enter a file name first.');
            }
        }
    </script>
</body>
</html>
